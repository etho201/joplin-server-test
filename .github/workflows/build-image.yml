name: Build Container Images

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  arch_matrix:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux/amd64
          - os: ubuntu-24.04-arm
            arch: linux/arm64    
    runs-on: ${{ matrix.include.os }}
    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@v4

      - name: Set version based on tag
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Checkout Joplin Server
        uses: actions/checkout@v4
        with:
          repository: laurent22/joplin
          ref: server-${{ env.RELEASE_VERSION }}
          path: joplin

      - name: Checkout Joplin Server ARM fix
        uses: actions/checkout@v4
        with:
          repository: etechonomy/joplin-arm-fix
          path: joplin-arm-fix
          token: ${{ secrets.GH_PAT }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: etechonomy/joplin-server-test
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./joplin/
          # file: ./joplin/Dockerfile.server
          file: ./joplin-arm-fix/Dockerfile.server
          # platforms: linux/amd64,linux/arm64,linux/arm/v7
          platforms: {{  matrix.include.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update repo description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: etechonomy/joplin-server-test
